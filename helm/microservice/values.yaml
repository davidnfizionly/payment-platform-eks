replicaCount: 1

image:
  repository: ""
  tag: "latest"
  pullPolicy: Always

serviceAccount:
  create: true
  irsaRoleArn: ""

service:
  port: 8000

env: []

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

livenessProbe:
  path: /health
  initialDelaySeconds: 10
  periodSeconds: 15

readinessProbe:
  path: /health
  initialDelaySeconds: 5
  periodSeconds: 10
